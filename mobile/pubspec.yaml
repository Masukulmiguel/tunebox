name: tunebox
description: TuneBox - Toda a música, num só lugar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Audio
  just_audio: ^0.9.39
  audio_service: ^0.18.17

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Downloads
  flutter_downloader: ^1.11.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  carousel_slider: ^5.0.0
  flutter_staggered_animations: ^1.1.1
  palette_generator: ^0.3.3+4

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  image_picker: ^1.0.7
  share_plus: ^9.0.0
  url_launcher: ^6.2.5
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_analytics: ^11.0.1
  firebase_crashlytics: ^4.0.1
  firebase_messaging: ^15.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

